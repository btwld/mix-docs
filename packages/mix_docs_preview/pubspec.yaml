name: mix_docs_preview
description: Flutter preview widgets and manifest for the Mix documentation site.
publish_to: none
version: 1.0.0

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  mix: ^2.1.0
  mix_tailwinds: ^0.0.1-alpha.1
  remix:
    git:
      url: https://github.com/btwld/remix.git
      path: packages/remix
      ref: fbfc069509ca955a459fcdc6b7de083201cbf2ca

dev_dependencies:
  flutter_test:
    sdk: flutter
  dart_code_metrics_presets: ^2.24.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
